name: Deploy Website to Amazon S3

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-stock-inventory-website
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Verify required GitHub variables
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          echo "Checking API base URL..."

          if [ -z "$NEXT_PUBLIC_API_BASE_URL" ]; then
            echo "ERROR: NEXT_PUBLIC_API_BASE_URL is empty."
            exit 1
          fi

          if [ -z "$AWS_REGION" ]; then
            echo "ERROR: AWS_REGION is empty."
            exit 1
          fi

          if [ -z "$S3_BUCKET" ]; then
            echo "ERROR: S3_BUCKET is empty."
            exit 1
          fi

          if [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "ERROR: CLOUDFRONT_DISTRIBUTION_ID is empty."
            exit 1
          fi

          echo "NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL"

      - name: Build static Next.js website
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          npm run build

      - name: Verify static build output
        run: |
          test -d out
          test -f out/index.html

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload website files to Amazon S3
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          aws s3 sync ./out/ "s3://$S3_BUCKET" --delete

      - name: Verify route files uploaded to S3
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          echo "Checking deployed files in S3..."

          REQUIRED_KEYS=(
            "index.html"
            "login/index.html"
            "seller/index.html"
            "master/index.html"
          )

          for KEY in "${REQUIRED_KEYS[@]}"; do
            if ! aws s3api head-object \
              --bucket "$S3_BUCKET" \
              --key "$KEY" > /dev/null 2>&1; then

              echo "ERROR: File was not found in S3: $KEY"
              echo ""

              echo "Files currently inside master folder:"
              aws s3 ls "s3://$S3_BUCKET/master/" --recursive || true

              echo ""
              echo "Files currently inside seller folder:"
              aws s3 ls "s3://$S3_BUCKET/seller/" --recursive || true

              exit 1
            fi

            echo "OK in S3: $KEY"
          done

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          INVALIDATION_ID=$(
            aws cloudfront create-invalidation \
              --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
              --paths "/*" \
              --query "Invalidation.Id" \
              --output text
          )

          echo "CloudFront invalidation created successfully."
          echo "Invalidation ID: $INVALIDATION_ID"

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "ERROR: CLOUDFRONT_DISTRIBUTION_ID GitHub variable is empty."
            exit 1
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"

      - name: Deployment completed
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          echo "Website deployed successfully to S3 bucket: ${{ vars.S3_BUCKET }}"
